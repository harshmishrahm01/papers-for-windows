name: CI / Build

on:
  push:
    branches: [ "main", "master", "feature/**", "windows**" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cargo Format Check
        run: |
          cd shell && cargo fmt --check

      - name: EditorConfig Check
        run: |
          pip install editorconfig-checker
          editorconfig-checker --disable-indentation --exclude '^.git/' || true

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    container:
      image: fedora:rawhide
    steps:
      - name: Install Build Dependencies
        run: |
          dnf install -y \
            meson appstream cairo-devel clippy dbus-devel desktop-file-utils \
            djvulibre-devel exempi-devel gi-docgen glib2-devel gobject-introspection-devel \
            gsettings-desktop-schemas-devel gtk4-devel itstool libadwaita-devel \
            libarchive-devel libsass-devel libsecret-devel libtiff-devel \
            nautilus-devel poppler-glib-devel yelp-tools zlib-devel rust rustfmt cargo git \
            blueprint-compiler gettext gcc gcc-c++

      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "*"
          git submodule init
          git submodule update --checkout

      - name: Build GIR generator & update bindings
        run: |
          cargo install --path rust/gir
          export PATH=$PATH:$HOME/.cargo/bin
          meson setup _build -Dbuildtype=debug --werror
          meson compile -C _build update-rust-bindings

      - name: Compile & Test
        run: |
          meson compile -C _build
          meson test -C _build --print-errorlogs

  build-windows:
    name: Build & Package (Windows MSYS2)
    runs-on: windows-latest
    steps:
      - name: Checkout repository with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2 Environment
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-rust
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-libadwaita
            mingw-w64-ucrt-x86_64-poppler
            mingw-w64-ucrt-x86_64-libspelling
            mingw-w64-ucrt-x86_64-blueprint-compiler
            mingw-w64-ucrt-x86_64-gettext
            mingw-w64-ucrt-x86_64-appstream
            mingw-w64-ucrt-x86_64-djvulibre
            mingw-w64-ucrt-x86_64-libarchive
            mingw-w64-ucrt-x86_64-libtiff
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-osslsigncode
            mingw-w64-ucrt-x86_64-nsis
            mingw-w64-ucrt-x86_64-adwaita-icon-theme
            mingw-w64-ucrt-x86_64-hicolor-icon-theme
            diffutils
            git

      - name: Meson Build
        shell: msys2 {0}
        run: |
          meson setup build --buildtype=release --strip -Ddocumentation=false -Duser_doc=false -Dnautilus=false -Dkeyring=disabled
          meson compile -C build

      - name: Bundle Windows App
        shell: powershell
        run: |
          $env:Path = "C:\msys64\ucrt64\bin;C:\msys64\usr\bin;${env:Path}"
          powershell -ExecutionPolicy Bypass -File build-aux\windows\bundle.ps1

      - name: Code Signing (Optional)
        shell: powershell
        env:
          WIN_SIGNING_CERT_BASE64: ${{ secrets.WIN_SIGNING_CERT_BASE64 }}
          WIN_SIGNING_CERT_PASS: ${{ secrets.WIN_SIGNING_CERT_PASS }}
        run: |
          if ($env:WIN_SIGNING_CERT_BASE64 -and $env:WIN_SIGNING_CERT_PASS) {
              Write-Host "Signing certificate found. Proceeding to sign binaries..."
              $env:Path = "C:\msys64\ucrt64\bin;C:\msys64\usr\bin;${env:Path}"
              [IO.File]::WriteAllBytes("cert.p12", [System.Convert]::FromBase64String($env:WIN_SIGNING_CERT_BASE64))
              Get-ChildItem "dist\bin\*.dll", "dist\bin\*.exe", "dist\lib\papers\6\backends\*.dll" | ForEach-Object {
                  & osslsigncode sign -pkcs12 cert.p12 -pass $env:WIN_SIGNING_CERT_PASS -t http://timestamp.digicert.com -in $_.FullName -out $_.FullName
              }
              Remove-Item cert.p12 -Force
          } else {
              Write-Host "No signing certificate configured. Skipping binary signing."
          }

      - name: Create Portable Zip Package
        shell: powershell
        run: |
          Compress-Archive -Path dist\* -DestinationPath papers-windows-x86_64-portable.zip

      - name: Build NSIS Setup Installer
        shell: msys2 {0}
        run: |
          makensis build-aux/windows/papers.nsi

      - name: Sign NSIS Setup Installer (Optional)
        shell: powershell
        env:
          WIN_SIGNING_CERT_BASE64: ${{ secrets.WIN_SIGNING_CERT_BASE64 }}
          WIN_SIGNING_CERT_PASS: ${{ secrets.WIN_SIGNING_CERT_PASS }}
        run: |
          if ($env:WIN_SIGNING_CERT_BASE64 -and $env:WIN_SIGNING_CERT_PASS) {
              Write-Host "Signing final setup installer..."
              $env:Path = "C:\msys64\ucrt64\bin;C:\msys64\usr\bin;${env:Path}"
              [IO.File]::WriteAllBytes("cert.p12", [System.Convert]::FromBase64String($env:WIN_SIGNING_CERT_BASE64))
              Get-ChildItem "papers-*-installer-x64.exe" | ForEach-Object {
                  & osslsigncode sign -pkcs12 cert.p12 -pass $env:WIN_SIGNING_CERT_PASS -t http://timestamp.digicert.com -in $_.FullName -out $_.FullName
              }
              Remove-Item cert.p12 -Force
          }

      - name: Upload Portable Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-windows-x86_64-portable
          path: papers-windows-x86_64-portable.zip

      - name: Upload NSIS Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: papers-windows-x86_64-setup
          path: papers-*-installer-x64.exe
